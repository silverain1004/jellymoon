<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YEJU</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="YEJU" />
  <meta property="og:image" content="jellybackground.png" />
  <meta property="og:image:width" content="640" />
  <meta property="og:image:height" content="640" />
  <meta property="og:locale" content="ko_KR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="jellybackground.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%92%95%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="next.css" />
</head>
<body>
  <main class="memory-app">
    <header class="memory-header">
      <!-- <h1 class="memory-title">은비의 고양이 같은그림찾기</h1> -->
      <!-- <p class="memory-subtitle">같은 그림 2장을 맞춰보세요. (가로 5 x 세로 6)</p> -->
    </header>

    <section class="memory-hud" aria-live="polite">
      <!-- <p class="hud-item">시도: <span id="tries">0</span></p> -->
      <p class="hud-item"> 정답 개수:
        <span id="matchedPairs">0</span> / <span id="totalPairs">10</span>
      </p>
      <p class="hud-item"> 남은 시간:
        <span id="countdown">00:30</span>
      </p>
    </section>

    <section class="board-wrap">
      <div class="memory-board" id="memoryBoard"></div>
      <div class="white-fade" id="whiteFade" aria-hidden="true"></div>
    </section>

    <button class="debug-pass-btn" id="debugPassBtn" type="button" hidden>테스트 통과</button>
  </main>

  <div class="game-modal is-visible" id="startModal" role="dialog" aria-modal="true" aria-labelledby="startModalTitle">
    <div class="game-modal-card">
      <h2 id="startModalTitle">같은그림찾기</h2>
      <p>30초 안에 카드를 전부 맞추면 성공!</p>
      <button class="modal-btn" id="startGameBtn" type="button">시작하기</button>
    </div>
  </div>

  <div class="game-modal" id="failModal" role="dialog" aria-modal="true" aria-labelledby="failModalTitle">
    <div class="game-modal-card">
      <h2 id="failModalTitle">시간 초과!</h2>
      <p>포기하지마 넌 할 수 있어</p>
      <button class="modal-btn" id="retryBtn" type="button">다시하기</button>
    </div>
  </div>

  <article class="letter-card" id="letterCard" aria-hidden="true">
    <h2>사랑하는 내 친구 예주에게</h2>
    <p>너를 만난지 벌써 16년이 다 되어가네</p>
    <p>뭘 해줄까 하다가 내가 가장 잘하는 걸 해봤어</p>
    <p>긴 시간 동안 나랑 함께해줘서 고마워</p>
    <p>지나온 시간보다도 더 많은 세월이 남았지만</p>
    <p>우린 앞으로도 변함없이 쭉 함께일거야</p>
    <p>항상 고맙고 결혼 진심으로 축하해</p>
    <p>세상 누구보다 행복하길 진심으로 응원할게</p>
    <p>우린 평생 친구인거 알지 💕</p>
    <button class="letter-close-btn" id="letterCloseBtn" type="button">약속</button>
  </article>

  <iframe
    id="bgmPlayer"
    class="bgm-player"
    title="background music"
    src=""
    allow="autoplay; encrypted-media"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>

  <script src="next.js"></script>
</body>
</html>
