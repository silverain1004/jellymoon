<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YEJU</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="YEJU" />
  <meta property="og:image" content="jellybackground.png" />
  <meta property="og:image:width" content="640" />
  <meta property="og:image:height" content="640" />
  <meta property="og:locale" content="ko_KR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="jellybackground.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%92%95%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pin-gate" id="pinGate" role="dialog" aria-modal="true" aria-labelledby="pinTitle">
    <div class="pin-card">
      <h2 id="pinTitle" class="pin-title">Enter the Password</h2>
      <p class="pin-desc">은비를 만난 연도는?</p>
      <form id="pinForm" class="pin-form" novalidate>
        <div class="pin-slots" id="pinSlots" aria-label="4자리 PIN 입력">
          <input class="pin-slot" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" required />
          <input class="pin-slot" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" required />
          <input class="pin-slot" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" required />
          <input class="pin-slot" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" required />
        </div>
      </form>
      <p class="pin-error" id="pinError" aria-live="polite"></p>
    </div>
  </div>

  <main class="app">
    <section class="hud">
      <div>
        <h1 class="title">은비에게 부케를 던지세요!</h1>
        <!-- <p class="hint">화면을 꾹 눌러 부케를 던져요</p> -->
      </div>
      <div class="meter-wrap" aria-live="polite">
        <div class="meter" aria-hidden="true">
          <div class="meter-success-zone" id="meterSuccessZone"></div>
          <div class="meter-fill" id="meterFill"></div>
        </div>
      </div>
    </section>

    <section class="stage" id="stage">
      <div class="ground"></div>
      <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

      <div class="character bride" aria-label="예주">
        👰🏻‍♀️
        <span class="name">예주</span>
      </div>

      <div class="character friend" aria-label="은비">
        🙋🏻‍♀️
        <span class="name">은비</span>
      </div>

      <div class="bouquet" id="bouquet" aria-hidden="true">💐</div>
    </section>

    <p class="status" id="status">화면을 길게 눌렀다 떼어봐</p>
    <button class="enter-btn" id="enterBtn" type="button" disabled>입장하기</button>
  </main>
  <div class="page-fade" id="pageFade" aria-hidden="true"></div>
  <iframe
    id="bgmPlayer"
    class="bgm-player"
    title="background music"
    src=""
    allow="autoplay; encrypted-media"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>

  <script src="script.js"></script>
</body>
</html>
