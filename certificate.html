<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YEJU</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%92%95%3C/text%3E%3C/svg%3E" />
  <style>
    @font-face {
      font-family: "HimnaeraneunMalbodan";
      src: url("font/%EB%82%98%EB%88%94%EC%86%90%EA%B8%80%EC%94%A8%20%ED%9E%98%EB%82%B4%EB%9D%BC%EB%8A%94%20%EB%A7%90%EB%B3%B4%EB%8B%A8.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 20px;
      font-family: "HimnaeraneunMalbodan", "Apple SD Gothic Neo", sans-serif;
      letter-spacing: 0.03em;
      color: #2f2a25;
      background-color: #f2dfdc;
      background-image: url("jellybackground.png");
      background-repeat: repeat;
      background-size: 320px auto;
    }

    .certificate {
      position: relative;
      width: min(760px, 100%);
      background: #fff;
      border: 12px solid #d8b06c;
      box-shadow: 0 20px 36px rgba(81, 48, 74, 0.15);
      padding: 20px;
    }

    .paper {
      border: 2px solid #d8b06c;
      padding: 44px 52px 36px;
      min-height: 640px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto auto;
      gap: 12px;
    }

    .title {
      margin: 0;
      text-align: center;
      letter-spacing: 0.5em;
      font-size: clamp(2.1rem, 5vw, 3rem);
    }

    .recipient {
      margin: 0;
      text-align: right;
      padding-right: 8px;
      font-size: clamp(1.18rem, 2.5vw, 1.4rem);
    }

    .award {
      margin: 8px 0 0;
      font-size: clamp(1.25rem, 2.8vw, 1.55rem);
    }

    .desc {
      margin: 8px 0 0;
      line-height: 1.8;
      font-size: clamp(1.03rem, 2.2vw, 1.2rem);
      text-align: center;
    }

    .date {
      margin: 0;
      text-align: center;
      font-size: clamp(1.05rem, 2.2vw, 1.2rem);
    }

    .sign-row {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-top: 8px;
      gap: 12px;
    }

    .issuer {
      margin: 0;
      font-size: clamp(1rem, 2.1vw, 1.16rem);
    }

    .name {
      margin: 0;
      font-size: clamp(2rem, 4.4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .stamp {
      font-size: clamp(2rem, 4.2vw, 2.5rem);
      color: #c02b2b;
      opacity: 0.95;
    }

    @media (max-width: 720px) {
      .certificate {
        border-width: 9px;
        padding: 12px;
      }

      .paper {
        min-height: 560px;
        padding: 30px 20px 24px;
      }

      .title {
        letter-spacing: 0.35em;
      }
    }

    .bgm-player {
      position: fixed;
      width: 0;
      height: 0;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <article class="certificate">
    <section class="paper">
      <h1 class="title">상 장</h1>
      <p class="recipient">문예주</p>
      <p class="award">내가제일잘났상</p>
      <p class="desc">
        <br />
        <br />
        귀하는 유쾌한 입담과 타이밍으로<br />
        주변인에게 큰 웃음을 주며<br />
        특히 은비에게 큰 힘이 되므로<br />
        이 상을 수여합니다.<br />
        <br />
      </p>
      <p class="date">2026년 3월 28일</p>
      <br />
      <div class="sign-row">
        <div>
          <p class="issuer">너의 짱친</p>
          <p class="name">최은비</p>
        </div>
        <span class="stamp">㊞</span>
      </div>
    </section>
  </article>
  <iframe
    id="bgmPlayer"
    class="bgm-player"
    title="background music"
    src=""
    allow="autoplay; encrypted-media"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>
  <script>
    const bgmPlayer = document.getElementById("bgmPlayer");
    const params = new URLSearchParams(window.location.search);
    if (bgmPlayer && params.get("bgm") === "1") {
      const videoId = "-YBTYrIzlYc";
      bgmPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&loop=1&playlist=${videoId}&controls=0`;
    }
  </script>
</body>
</html>
