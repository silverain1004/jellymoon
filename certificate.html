<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YEJU</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%92%95%3C/text%3E%3C/svg%3E" />
  <style>
    @font-face {
      font-family: "HimnaeraneunMalbodan";
      src: url("font/%EB%82%98%EB%88%94%EC%86%90%EA%B8%80%EC%94%A8%20%ED%9E%98%EB%82%B4%EB%9D%BC%EB%8A%94%20%EB%A7%90%EB%B3%B4%EB%8B%A8.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "HimnaeraneunMalbodan", "Apple SD Gothic Neo", sans-serif;
      letter-spacing: 0.03em;
      color: #2f2a25;
      background-color: #f2dfdc;
      background-image: url("jellybackground.png");
      background-repeat: repeat;
      background-size: 320px auto;
    }

    .certificate {
      position: relative;
      width: min(760px, 100%);
      background: #fff;
      border: 12px solid #d8b06c;
      box-shadow: 0 20px 36px rgba(81, 48, 74, 0.15);
      padding: 20px;
    }

    .paper {
      border: 2px solid #d8b06c;
      padding: 44px 52px 36px;
      min-height: 640px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto auto;
      gap: 12px;
    }

    .title {
      margin: 0;
      text-align: center;
      letter-spacing: 0.5em;
      font-size: clamp(2.1rem, 5vw, 3rem);
    }

    .recipient {
      margin: 0;
      text-align: right;
      padding-right: 8px;
      font-size: clamp(1.18rem, 2.5vw, 1.4rem);
    }

    .award {
      margin: 8px 0 0;
      font-size: clamp(1.25rem, 2.8vw, 1.55rem);
    }

    .desc {
      margin: 8px 0 0;
      line-height: 1.8;
      font-size: clamp(1.03rem, 2.2vw, 1.2rem);
      text-align: center;
    }

    .date {
      margin: 0;
      text-align: center;
      font-size: clamp(1.05rem, 2.2vw, 1.2rem);
    }

    .sign-row {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-top: 8px;
      gap: 12px;
    }

    .issuer {
      margin: 0;
      font-size: clamp(1rem, 2.1vw, 1.16rem);
    }

    .name {
      margin: 0;
      font-size: clamp(2rem, 4.4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .stamp {
      font-size: clamp(2rem, 4.2vw, 2.5rem);
      color: #c02b2b;
      opacity: 0.95;
    }

    @media (max-width: 720px) {
      .certificate {
        border-width: 9px;
        padding: 12px;
      }

      .paper {
        min-height: 560px;
        padding: 30px 20px 24px;
      }

      .title {
        letter-spacing: 0.35em;
      }
    }

    .bgm-player {
      position: fixed;
      width: 0;
      height: 0;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }

    .runaway-btn {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 9999;
      border: 2px solid #fff3bf;
      border-radius: 999px;
      background: linear-gradient(145deg, #fff7c6 0%, #ffd766 32%, #f0b90b 66%, #cc8c00 100%);
      color: #5e4100;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
      font-family: inherit;
      font-size: clamp(1.02rem, 2.7vw, 1.2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 13px 22px;
      box-shadow: 0 10px 26px rgba(204, 140, 0, 0.38), 0 0 0 2px rgba(255, 230, 156, 0.5), 0 0 22px rgba(255, 215, 102, 0.55);
      cursor: pointer;
      user-select: none;
      touch-action: none;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      white-space: nowrap;
    }

    .runaway-btn:hover {
      transform: translateX(-50%) scale(1.03);
      box-shadow: 0 14px 30px rgba(204, 140, 0, 0.45), 0 0 0 3px rgba(255, 235, 175, 0.62), 0 0 30px rgba(255, 215, 102, 0.68);
      filter: brightness(1.05);
    }

    .runaway-btn.is-floating {
      animation: btn-float-y 0.9s ease-in-out infinite alternate;
    }

    @keyframes btn-float-y {
      from {
        transform: translateX(-50%) translateY(0);
      }
      to {
        transform: translateX(-50%) translateY(-10px);
      }
    }

    .top-toast {
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%) translateY(-12px);
      z-index: 10000;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(47, 42, 37, 0.9);
      color: #fff8e1;
      font-size: clamp(0.92rem, 2.2vw, 1.03rem);
      letter-spacing: 0.02em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      white-space: nowrap;
    }

    .top-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .coin-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10001;
      overflow: hidden;
    }

    .coin {
      position: fixed;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(163, 109, 0, 0.8);
      background: radial-gradient(circle at 30% 30%, #fff3b0 0%, #ffd54d 45%, #e6a700 100%);
      color: #7a5200;
      font-size: 12px;
      font-weight: 700;
      line-height: 22px;
      text-align: center;
      box-shadow: 0 2px 7px rgba(110, 74, 0, 0.45);
      animation: coin-burst 980ms ease-out forwards;
      transform: translate(-50%, -50%);
    }

    @keyframes coin-burst {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--dx), var(--dy)) rotate(var(--spin)) scale(0.78);
      }
    }
  </style>
</head>
<body>
  <article class="certificate">
    <section class="paper">
      <h1 class="title">상 장</h1>
      <p class="recipient">문예주</p>
      <p class="award">내가제일잘났상</p>
      <p class="desc">
        <br />
        <br />
        귀하는 유쾌한 입담과 타이밍으로<br />
        주변인에게 큰 웃음을 주며<br />
        특히 은비에게 큰 힘이 되므로<br />
        이 상을 수여합니다.<br />
        <br />
      </p>
      <p class="date">2026년 3월 28일</p>
      <br />
      <div class="sign-row">
        <div>
          <p class="issuer">너의 짱친</p>
          <p class="name">최은비</p>
        </div>
        <span class="stamp">㊞</span>
      </div>
    </section>
  </article>
  <iframe
    id="bgmPlayer"
    class="bgm-player"
    title="background music"
    src=""
    allow="autoplay; encrypted-media"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>
  <div id="coinLayer" class="coin-layer" aria-hidden="true"></div>
  <div id="topToast" class="top-toast" role="status" aria-live="polite"></div>
  <button id="runawayBtn" class="runaway-btn is-floating" type="button">100만원 받기</button>
  <script>
    const bgmPlayer = document.getElementById("bgmPlayer");
    const runawayBtn = document.getElementById("runawayBtn");
    const topToast = document.getElementById("topToast");
    const coinLayer = document.getElementById("coinLayer");
    const params = new URLSearchParams(window.location.search);
    let chaseCount = 0;
    let toastTimer = 0;
    const chaseMessages = {
      10: "집요한데..?",
      20: "아직도 누르고 있어?",
      30: "이제 끝났어",
    };

    if (bgmPlayer && params.get("bgm") === "1") {
      const videoId = "-YBTYrIzlYc";
      bgmPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&loop=1&playlist=${videoId}&controls=0`;
    }

    function showTopToast(message) {
      if (!topToast || !message) return;
      topToast.textContent = message;
      topToast.classList.add("show");
      if (toastTimer) window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        topToast.classList.remove("show");
      }, 1700);
    }

    function burstCoinsAt(x, y) {
      if (!coinLayer) return;
      const count = 46;
      for (let i = 0; i < count; i += 1) {
        const coin = document.createElement("span");
        coin.className = "coin";
        coin.textContent = "$";
        coin.style.left = `${x}px`;
        coin.style.top = `${y}px`;
        const dx = (Math.random() - 0.5) * 340;
        const dy = 26 + Math.random() * 180;
        const spin = `${Math.random() * 520 - 260}deg`;
        coin.style.setProperty("--dx", `${dx.toFixed(1)}px`);
        coin.style.setProperty("--dy", `${dy.toFixed(1)}px`);
        coin.style.setProperty("--spin", spin);
        coinLayer.appendChild(coin);
        window.setTimeout(() => {
          coin.remove();
        }, 1000);
      }
    }

    function recordChaseAttempt(pointerX, pointerY) {
      chaseCount += 1;
      const message = chaseMessages[chaseCount];
      if (message) {
        showTopToast(message);
        return;
      }
      if (chaseCount >= 40 && chaseCount % 10 === 0) {
        showTopToast("옛다");
        burstCoinsAt(
          typeof pointerX === "number" ? pointerX : window.innerWidth * 0.5,
          typeof pointerY === "number" ? pointerY : window.innerHeight * 0.5
        );
      }
    }

    function moveRunawayButton() {
      if (!runawayBtn) return;
      runawayBtn.classList.remove("is-floating");
      const margin = 12;
      const buttonRect = runawayBtn.getBoundingClientRect();
      const maxX = Math.max(margin, window.innerWidth - buttonRect.width - margin);
      const maxY = Math.max(margin, window.innerHeight - buttonRect.height - margin);
      const nextX = margin + Math.random() * (maxX - margin);
      const nextY = margin + Math.random() * (maxY - margin);
      runawayBtn.style.left = `${nextX}px`;
      runawayBtn.style.top = `${nextY}px`;
      runawayBtn.style.bottom = "auto";
      runawayBtn.style.transform = "none";
    }

    if (runawayBtn) {
      runawayBtn.addEventListener("pointerenter", moveRunawayButton);
      runawayBtn.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        recordChaseAttempt(event.clientX, event.clientY);
        moveRunawayButton();
      }, { passive: false });
      runawayBtn.addEventListener("click", (event) => {
        event.preventDefault();
        moveRunawayButton();
      });
      runawayBtn.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        const rect = runawayBtn.getBoundingClientRect();
        recordChaseAttempt(rect.left + rect.width / 2, rect.top + rect.height / 2);
        moveRunawayButton();
      });
    }
  </script>
</body>
</html>
